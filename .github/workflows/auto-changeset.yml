name: Auto Changeset

# Runs when a feature PR is merged into dev.
# Detects which publishable packages changed and writes a .changeset/*.md
# file, then commits it to dev — those changesets are later included in the
# dev → main "release:" PR that triggers the Release workflow.
#
# Bump type is controlled by PR labels:
#   major  →  breaking change
#   minor  →  new feature
#   patch  →  bug fix / default (applied automatically by pr-label.yml)
#
# Package scope is controlled by pkg:* labels:
#   pkg:ui     →  include @almach/ui
#   pkg:forms  →  include @almach/forms
#   pkg:query  →  include @almach/query
#   pkg:utils  →  include @almach/utils
#
# Without any pkg:* label, affected packages are auto-detected from git diff.
# pkg:* labels always override auto-detection (useful for cross-cutting changes
# that touch shared files not under packages/*).
#
# Add the label  skip-changeset  to a PR to skip this entirely
# (e.g. docs-only PRs that touch no publishable package).

on:
  pull_request:
    types: [closed]
    branches: [dev]

permissions:
  contents: write

jobs:
  generate:
    name: Generate changeset
    # Only on merged PRs; skip the "Version Packages" PR Changesets itself creates
    if: |
      github.event.pull_request.merged == true &&
      github.event.pull_request.head.ref != 'changeset-release/main' &&
      !contains(github.event.pull_request.labels.*.name, 'skip-changeset')
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          # Full history so we can diff between base and merge commit
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      # ── 1. Resolve bump type ───────────────────────────────────────────────
      - name: Resolve bump type from PR labels
        id: bump
        run: |
          LABELS='${{ toJson(github.event.pull_request.labels.*.name) }}'
          if echo "$LABELS" | grep -q '"major"'; then
            echo "type=major" >> "$GITHUB_OUTPUT"
          elif echo "$LABELS" | grep -q '"minor"'; then
            echo "type=minor" >> "$GITHUB_OUTPUT"
          else
            echo "type=patch" >> "$GITHUB_OUTPUT"
          fi

      # ── 2. Detect which publishable packages to include ────────────────────
      # Priority: pkg:* labels > git diff auto-detection
      - name: Detect packages for changeset
        id: pkgs
        env:
          LABELS: ${{ toJson(github.event.pull_request.labels.*.name) }}
        run: |
          BASE="${{ github.event.pull_request.base.sha }}"
          HEAD="${{ github.event.pull_request.merge_commit_sha }}"

          # Extract any pkg:* label overrides (e.g. pkg:ui → "ui")
          PKG_OVERRIDES=$(node -e "
            const labels = JSON.parse(process.env.LABELS);
            labels
              .filter(l => l.startsWith('pkg:'))
              .forEach(l => process.stdout.write(l.slice(4) + '\n'));
          ")

          PKGS=""

          if [ -n "$PKG_OVERRIDES" ]; then
            # ── Label override: use only the labelled packages ───────────────
            echo "pkg:* labels present — using override: $(echo "$PKG_OVERRIDES" | tr '\n' ' ')"
            while IFS= read -r short; do
              [ -z "$short" ] && continue
              dir="packages/${short}"
              name=$(node -e "
                try {
                  const p = require('./${dir}/package.json');
                  if (!p.private) process.stdout.write(p.name);
                } catch {}
              " 2>/dev/null || true)
              if [ -n "$name" ]; then
                PKGS="${PKGS}${name},"
              else
                echo "Warning: pkg:${short} has no matching publishable package — skipped"
              fi
            done <<< "$PKG_OVERRIDES"
          else
            # ── Auto-detect: diff between base and merge commit ──────────────
            CHANGED=$(git diff --name-only "$BASE" "$HEAD")
            echo "Changed files:"
            echo "$CHANGED"
            for dir in packages/*/; do
              name=$(node -e "
                const p = require('./${dir}package.json');
                if (!p.private) process.stdout.write(p.name);
              " 2>/dev/null || true)
              short="${dir%/}"
              if [ -n "$name" ] && echo "$CHANGED" | grep -q "^${short}/"; then
                PKGS="${PKGS}${name},"
              fi
            done
          fi

          PKGS="${PKGS%,}"
          echo "list=${PKGS}" >> "$GITHUB_OUTPUT"
          if [ -n "$PKGS" ]; then
            echo "Affected packages: $PKGS"
          else
            echo "No publishable packages changed — skipping changeset"
          fi

      # ── 3. Write the .changeset file ──────────────────────────────────────
      - name: Write changeset file
        if: steps.pkgs.outputs.list != ''
        env:
          BUMP: ${{ steps.bump.outputs.type }}
          PKGS: ${{ steps.pkgs.outputs.list }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          ID=$(openssl rand -hex 4)
          FILE=".changeset/auto-${ID}.md"

          {
            echo "---"
            IFS=',' read -ra LIST <<< "$PKGS"
            for pkg in "${LIST[@]}"; do
              [ -n "$pkg" ] && echo "\"${pkg}\": ${BUMP}"
            done
            echo "---"
            echo ""
            echo "${PR_TITLE} (#${PR_NUMBER})"
          } > "$FILE"

          echo "=== Generated: $FILE ==="
          cat "$FILE"

      # ── 4. Commit and push ─────────────────────────────────────────────────
      - name: Commit and push changeset
        if: steps.pkgs.outputs.list != ''
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .changeset/
          if git diff --staged --quiet; then
            echo "Nothing to commit"
          else
            git commit -m "chore: auto-changeset for PR #${{ github.event.pull_request.number }}"
            git push
          fi
