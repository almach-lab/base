name: PR Labels

# Automatically applies a default "patch" bump label to every new PR
# so auto-changeset.yml always has a bump type to work with.
#
# Contributors can change the label to "minor" or "major" before merging.
# Adding "skip-changeset" removes the bump label and skips changeset generation.

on:
  pull_request:
    types: [opened, reopened]
    branches: [dev]

permissions:
  pull-requests: write

jobs:
  default-label:
    name: Apply default bump label
    # Skip the automated "Version Packages" PR from Changesets
    if: github.event.pull_request.head.ref != 'changeset-release/dev'
    runs-on: ubuntu-latest

    steps:
      - name: Apply "patch" if no bump label exists
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request;
            const labels = pr.labels.map(l => l.name);
            const bumpLabels = ['major', 'minor', 'patch'];
            const hasBump = labels.some(l => bumpLabels.includes(l));

            if (!hasBump) {
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: pr.number,
                labels: ['patch'],
              });
              core.info('Applied default label: patch');
            } else {
              core.info(`Bump label already present: ${labels.filter(l => bumpLabels.includes(l)).join(', ')}`);
            }
