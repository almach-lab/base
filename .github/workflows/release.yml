name: Release

on:
  push:
    branches: [main]
    paths:
      - "packages/**"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  release:
    name: Version and publish packages
    if: github.event_name == 'workflow_dispatch' || github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: write
      id-token: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.9"

      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: ${{ runner.os }}-bun-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Generate changeset from conventional commits
        if: github.event_name == 'push'
        run: node scripts/auto-changeset-from-commits.mjs "${{ github.event.before }}" "${{ github.sha }}"

      - name: Check for pending changesets
        id: check
        run: |
          COUNT=$(find .changeset -name '*.md' ! -name 'README.md' | wc -l)
          if [ "$COUNT" -gt 0 ]; then
            echo "has_changesets=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_changesets=false" >> "$GITHUB_OUTPUT"
          fi
          echo "Pending changesets: $COUNT"

      - name: Stop when there are no pending changesets
        if: steps.check.outputs.has_changesets != 'true'
        run: |
          echo "No pending changesets. Skipping release."
          echo "## Release skipped" >> "$GITHUB_STEP_SUMMARY"
          echo "No pending \`.changeset/*.md\` files were found on \`main\`." >> "$GITHUB_STEP_SUMMARY"

      - name: Version packages
        if: steps.check.outputs.has_changesets == 'true'
        run: bun changeset version

      - name: Commit version bumps
        if: steps.check.outputs.has_changesets == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          if ! git diff --staged --quiet; then
            git commit -m "chore: version packages"
            git push
          fi

      - name: Build packages
        if: steps.check.outputs.has_changesets == 'true'
        run: bun run build --filter=!docs

      - name: Publish packages and create GitHub releases
        if: steps.check.outputs.has_changesets == 'true'
        id: publish
        uses: changesets/action@v1
        with:
          publish: bun run release
          createGithubReleases: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Release summary
        if: steps.publish.outputs.published == 'true'
        run: |
          echo "## Published" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo '${{ steps.publish.outputs.publishedPackages }}' \
            | node -e "
                const pkgs = JSON.parse(require('fs').readFileSync('/dev/stdin','utf8'));
                pkgs.forEach(p => console.log('- **' + p.name + '** -> v' + p.version));
              " >> "$GITHUB_STEP_SUMMARY"
