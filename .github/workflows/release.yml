name: Release

# Triggered when a PR from dev → main with title starting "release:" is merged.
#
# Fully automatic single-run flow — no intermediate "Version Packages" PR:
#   1. changeset version  — bumps package.json, updates CHANGELOG.md, removes .changeset/*.md
#   2. git commit + push  — locks version bumps on main
#   3. changeset publish  — publishes new versions to npm (skips already-published)
#   4. GitHub Releases    — one release per package, body from CHANGELOG
#
# Bump type is controlled by PR labels (major / minor / patch).
# Package scope is controlled by pkg:* labels — see auto-changeset.yml.

on:
  workflow_dispatch:
  pull_request:
    types: [closed]
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  release:
    name: Release packages
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'workflow_dispatch' ||
      (
        github.event.pull_request.merged == true &&
        startsWith(github.event.pull_request.title, 'release:') &&
        github.event.pull_request.head.ref == 'dev'
      )
    permissions:
      contents: write   # push version-bump commit, create tags + GitHub Releases
      id-token: write   # npm provenance attestation

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.9"

      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: ${{ runner.os }}-bun-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      # ── 1. Guard — nothing to do if no changesets are pending ─────────────
      - name: Check for pending changesets
        id: check
        run: |
          COUNT=$(find .changeset -name '*.md' ! -name 'README.md' | wc -l)
          echo "has_changesets=$([ "$COUNT" -gt 0 ] && echo true || echo false)" >> "$GITHUB_OUTPUT"
          echo "Pending changesets: $COUNT"

      # ── 2. Bump versions + regenerate CHANGELOGs ──────────────────────────
      # Removes .changeset/*.md files so the publish step below goes straight
      # to publish mode (no intermediate "Version Packages" PR needed).
      - name: Version packages
        if: steps.check.outputs.has_changesets == 'true'
        run: bun changeset version

      # ── 3. Commit version bumps to main ───────────────────────────────────
      - name: Commit version bumps
        if: steps.check.outputs.has_changesets == 'true'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          if ! git diff --staged --quiet; then
            git commit -m "chore: version packages"
            git push
          fi

      # ── 4. Publish to npm + create GitHub Releases ────────────────────────
      # changesets/action sees no .changeset/*.md → publish mode only.
      # scripts/release.sh works around a bun limitation: bun publish rejects
      # non-JS exports (e.g. @almach/ui's ./styles CSS export), so the script
      # temporarily hides bun.lock and strips packageManager so changeset
      # falls back to `npm publish`. Already-published versions are skipped.
      - name: Publish packages & create GitHub Releases
        if: steps.check.outputs.has_changesets == 'true'
        id: publish
        uses: changesets/action@v1
        with:
          publish: bash scripts/release.sh
          createGithubReleases: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      # ── 5. Job summary ────────────────────────────────────────────────────
      - name: Summary
        if: steps.publish.outputs.published == 'true'
        run: |
          echo "## Published" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo '${{ steps.publish.outputs.publishedPackages }}' \
            | node -e "
                const pkgs = JSON.parse(require('fs').readFileSync('/dev/stdin','utf8'));
                pkgs.forEach(p => console.log('- **' + p.name + '** → v' + p.version));
              " >> "$GITHUB_STEP_SUMMARY"
