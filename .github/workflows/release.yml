name: Release

on:
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  release:
    name: Release packages to npm
    runs-on: ubuntu-latest
    permissions:
      contents: write       # to create release tags and commits
      pull-requests: write  # to create the "Version Packages" PR
      id-token: write       # for npm provenance

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          # Use a GitHub token with write permissions for changesets
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.9

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build all packages
        run: bun run build --filter=!docs

      # Hide bun.lock so changesets falls back to npm for publishing.
      # bun publish rejects non-JS exports (e.g. ./styles CSS export in @almach/ui).
      - name: Use npm for publishing
        run: mv bun.lock bun.lock.bak

      - name: Create Release PR or Publish to npm
        uses: changesets/action@v1
        with:
          version: bun changeset version
          publish: bun run build --filter=!docs && changeset publish
          title: "chore: release packages"
          commit: "chore: release packages"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Restore bun.lock
        if: always()
        run: mv bun.lock.bak bun.lock
