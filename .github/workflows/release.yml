name: Release

on:
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  release:
    name: Release packages to npm
    runs-on: ubuntu-latest
    permissions:
      contents: write       # to create release tags and commits
      pull-requests: write  # to create the "Version Packages" PR
      id-token: write       # for npm provenance

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.9

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Create Release PR or Publish to npm
        uses: changesets/action@v1
        with:
          version: bun changeset version
          # scripts/release.sh builds with bun (needs bun.lock for turbo), then
          # temporarily hides bun.lock + strips packageManager so changeset falls
          # back to npm publish (bun publish rejects non-JS exports like ./styles).
          publish: bash scripts/release.sh
          title: "chore: release packages"
          commit: "chore: release packages"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
