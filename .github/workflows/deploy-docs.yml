name: Deploy Docs → Cloudflare Pages

on:
  push:
    branches: [main]
  # Allow manual deploys from the Actions tab
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    name: Build & deploy to Cloudflare Pages
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write  # required by cloudflare/pages-action

    outputs:
      url: ${{ steps.deploy.outputs.url }}
      alias: ${{ steps.deploy.outputs.alias }}

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build packages (workspace dependencies)
        run: bun run build --filter=!docs

      - name: Build docs
        run: bun run build --filter=docs

      - name: Deploy to Cloudflare Pages
        id: deploy
        uses: cloudflare/pages-action@v1
        with:
          # Required secrets — add in repo Settings → Secrets → Actions:
          #   CLOUDFLARE_API_TOKEN  : Create at https://dash.cloudflare.com/profile/api-tokens
          #                           Use "Cloudflare Pages — Edit" template
          #   CLOUDFLARE_ACCOUNT_ID : Found in the right sidebar of dash.cloudflare.com
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          # Name of your Cloudflare Pages project (create it once at dash.cloudflare.com → Pages)
          projectName: based-ui-docs
          directory: apps/docs/dist
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
          # Deploy to production only on main; PRs get a preview URL
          branch: ${{ github.ref == 'refs/heads/main' && 'main' || github.head_ref }}

  notify:
    name: Post deploy URL
    runs-on: ubuntu-latest
    needs: deploy
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Print deployment URL
        run: |
          echo "✅ Deployed to: ${{ needs.deploy.outputs.url }}"
          echo "🔗 Alias: ${{ needs.deploy.outputs.alias }}"
