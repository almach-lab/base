name: Preview Docs (PRs)

on:
  pull_request:
    branches: [main]
    paths:
      - "apps/docs/**"
      - "packages/**"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  preview:
    name: Build & preview on Cloudflare Pages
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
      pull-requests: write  # to comment the preview URL

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build packages
        run: bun run build --filter=!docs

      - name: Build docs
        run: bun run build --filter=docs

      - name: Deploy preview to Cloudflare Pages
        id: preview
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          projectName: based-ui-docs
          directory: apps/docs/dist
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
          branch: ${{ github.head_ref }}

      - name: Comment preview URL on PR
        uses: actions/github-script@v7
        with:
          script: |
            const url = "${{ steps.preview.outputs.url }}";
            const alias = "${{ steps.preview.outputs.alias }}";
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: [
                "## 📦 Docs Preview",
                "",
                `**URL:** ${url}`,
                alias ? `**Alias:** ${alias}` : "",
                "",
                "_This preview will be promoted to production when the PR is merged._",
              ].filter(Boolean).join("\n"),
            });
